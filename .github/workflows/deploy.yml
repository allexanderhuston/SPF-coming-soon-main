name: Deploy to cPanel

on:
  push:
    branches:
      - main  # Change this to 'master' if your default branch is master

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 🚀 Sync files to cPanel
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftp.yourdomain.com         # Replace with your FTP Host
        username: user@yourdomain.com      # Replace with your FTP Username
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./public_html/         # The folder in cPanel you want to deploy to
